<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICE Obfuscator</title>
<!-- locateFile must be set BEFORE the script tag loads the WASM bundle -->
<script>
  var Module = {
    locateFile: function(f) {
      return 'https://unpkg.com/zstd-codec@0.1.4/dist/' + f;
    }
  };
</script>
<script src="https://unpkg.com/zstd-codec@0.1.4/dist/zstd-codec.js"
        onerror="onZstdLoadError()"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap');

  :root {
    --bg:     #050505;
    --bg2:    #0a0a0a;
    --border: #1a1a1a;
    --accent: #e8e8e8;
    --dim:    #404040;
    --glow:   rgba(255,255,255,0.04);
    --red:    #ff3333;
    --green:  #33ff33;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 60px;
  }

  .header {
    width: 100%;
    max-width: 900px;
    text-align: center;
    margin-bottom: 36px;
  }

  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 14px;
    color: #fff;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 6px;
    position: relative;
    display: inline-block;
  }
  .logo::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #fff, transparent);
  }

  .sub {
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--dim);
    margin-top: 12px;
    text-transform: uppercase;
  }

  .container {
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
  }

  .panel-header .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--dim);
    display: inline-block;
    margin-right: 8px;
  }
  .panel-header .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .panel-header .dot.red   { background: var(--red);   box-shadow: 0 0 6px var(--red);   }
  .panel-header .dot.amber { background: #ffaa00;      box-shadow: 0 0 6px #ffaa00;       }

  textarea {
    width: 100%;
    height: 220px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 14px;
    resize: vertical;
    caret-color: #fff;
  }
  textarea::placeholder { color: var(--dim); }

  .output-area {
    width: 100%;
    min-height: 120px;
    max-height: 340px;
    overflow-y: auto;
    padding: 14px;
    font-size: 12px;
    line-height: 1.5;
    color: #b0b0b0;
    word-break: break-all;
    white-space: pre-wrap;
    cursor: text;
    scrollbar-width: thin;
    scrollbar-color: #1f1f1f transparent;
  }
  .output-area::-webkit-scrollbar { width: 4px; }
  .output-area::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

  .empty-msg {
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 28px 14px;
    text-align: center;
  }

  .actions {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
  }

  button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 1px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    transition: all 0.15s;
  }
  button:hover { border-color: #555; color: var(--accent); background: var(--glow); }

  button.primary { border-color: var(--accent); color: var(--accent); background: transparent; }
  button.primary:hover  { background: var(--accent); color: #000; }
  button.primary:active { transform: scale(0.98); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  .stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
  }
  .stat-val { color: #888; }

  .badge {
    font-size: 10px;
    letter-spacing: 1px;
    padding: 2px 6px;
    border: 1px solid var(--dim);
    color: var(--dim);
    border-radius: 1px;
  }
  .badge.ok  { border-color: #1a3a1a; color: #33cc33; background: #0a1a0a; }
  .badge.err { border-color: #3a1a1a; color: #cc3333; background: #1a0a0a; }

  .notice {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    padding: 0 14px 10px;
  }

  /* loading pulse on button text */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
  .loading-text { animation: blink 1s ease-in-out infinite; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">ICE</div>
  <div class="sub">obfuscator &mdash; ascii85 + zstd &mdash; icegod.online</div>
</div>

<div class="container">

  <!-- INPUT -->
  <div class="panel">
    <div class="panel-header">
      <span><span class="dot" id="initDot"></span>input.lua</span>
      <span class="badge" id="inputBadge">INIT</span>
    </div>
    <textarea id="input" placeholder="-- paste your lua source here"></textarea>
    <div class="actions">
      <button class="primary" id="obfBtn" onclick="doObfuscate()" disabled>
        <span class="loading-text">LOADING...</span>
      </button>
      <button onclick="clearAll()">CLEAR</button>
    </div>
  </div>

  <!-- OUTPUT -->
  <div class="panel">
    <div class="panel-header">
      <span><span class="dot" id="outDot"></span>output.lua</span>
      <span class="badge" id="outBadge">EMPTY</span>
    </div>
    <div class="output-area" id="output">
      <div class="empty-msg">// obfuscated output will appear here</div>
    </div>
    <div class="stats" id="stats" style="display:none">
      <span>SOURCE <span class="stat-val" id="sSrc">—</span>b</span>
      <span>COMPRESSED <span class="stat-val" id="sCmp">—</span>b</span>
      <span>ENCODED <span class="stat-val" id="sEnc">—</span>b</span>
      <span>RATIO <span class="stat-val" id="sRatio">—</span></span>
    </div>
    <div class="actions">
      <button id="copyBtn" onclick="copyOutput()" disabled>COPY OUTPUT</button>
    </div>
    <div class="notice">zstd compression — compatible with Enum.CompressionAlgorithm.Zstd in Roblox</div>
  </div>

</div>

<script>
// ---------------------------------------------------------------
// Zstd init — using unpkg (fixes ZstdCodec not defined on jsdelivr)
// ---------------------------------------------------------------
let zstdSimple = null;
let zstdReady  = false;

function onZstdLoadError() {
  document.getElementById('inputBadge').textContent = 'CDN ERR';
  document.getElementById('inputBadge').className   = 'badge err';
  document.getElementById('initDot').className      = 'dot red';
  document.getElementById('obfBtn').innerHTML       = 'UNAVAILABLE';
  console.error('[ICE] Failed to load zstd-codec from unpkg.');
}

// ZstdCodec.run is async — wait for the WASM module to initialise
function initZstd() {
  if (typeof ZstdCodec === 'undefined') {
    // Script tag may still be parsing; retry once
    setTimeout(initZstd, 200);
    return;
  }
  ZstdCodec.run(zstd => {
    zstdSimple = new zstd.Simple();
    zstdReady  = true;

    const btn = document.getElementById('obfBtn');
    btn.disabled  = false;
    btn.innerHTML = 'OBFUSCATE';

    document.getElementById('inputBadge').textContent = 'READY';
    document.getElementById('inputBadge').className   = 'badge';
    document.getElementById('initDot').className      = 'dot';
  });
}

document.addEventListener('DOMContentLoaded', () => {
  // Small delay so the async script tag has time to execute
  setTimeout(initZstd, 50);
});

// ---------------------------------------------------------------
// Banner
// ---------------------------------------------------------------
const BANNER = `--[[
\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u28a0\u2864\u2864\u2836\u2816\u2812\u2812\u2813\u2813\u2812\u2836\u28e4\u2864\u2864\u2836\u2836\u2836\u2836\u2836\u28b6\u28c4\u28c4\u28c4\u28c4\u28c4\u28a0\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800
\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u28a0\u2864\u2864\u2864\u28b4\u28c4\u28c4\u28b4\u2836\u2813\u2809\u2801\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u28a0\u2816\u2801\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u28a0\u2834\u2809\u2801\u2809\u28f8\u28a7\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800
\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u28a0\u28b4\u2834\u2813\u2809\u2801\u2800\u2800\u28a0\u28b4\u280f\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2834\u280e\u2801\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2800\u2810\u28f8\u2800\u2800\u2800\u2800\u28fb\u28a7\u28a0\u2800\u2800\u2800\u2800\u2800\u2800\u2800
       d8888 888    d8P 
      d88888 888   d8P  
     d88P888 888  d8P   
    d88P 888 888d88K    
   d88P  888 8888888b   
  d88P   888 888  Y88b  
 d8888888888 888   Y88b 
d88P     888 888    Y88b
------------------------------
discord.gg/akadmin
]]--`;

// ---------------------------------------------------------------
// ASCII85 encoder — little-endian word packing (matches Lua decoder)
// ---------------------------------------------------------------
function encodeASCII85(bytes) {
  const padLen = Math.ceil(bytes.length / 4) * 4;
  const padded = new Uint8Array(padLen);
  padded.set(bytes);

  let out = '';
  for (let i = 0; i < padded.length; i += 4) {
    const v = (padded[i]
      | (padded[i + 1] << 8)
      | (padded[i + 2] << 16)
      | (padded[i + 3] * 0x1000000)) >>> 0;

    if (v === 0) {
      out += 'z';
    } else {
      let n = v, chunk = '';
      for (let j = 0; j < 5; j++) {
        chunk = String.fromCharCode((n % 85) + 33) + chunk;
        n = Math.floor(n / 85);
      }
      out += chunk;
    }
  }
  return out;
}

function pickDelimiter(s) {
  let n = 0;
  while (s.includes(']' + '='.repeat(n) + ']')) n++;
  return '='.repeat(n);
}

function obfuscate(luaSource) {
  if (!zstdReady) throw new Error('Zstd not ready — please wait');

  const bytes      = new TextEncoder().encode(luaSource);
  const compressed = zstdSimple.compress(bytes);
  if (!compressed || compressed.length === 0)
    throw new Error('Zstd compression failed');

  const encoded = encodeASCII85(compressed);
  const data    = 'LPS/' + encoded;
  const eq      = pickDelimiter(data);

  const runtime =
    `return(function(a,b,c,d,e,f,g,h,i,j,k,l,m,n)` +
    `local function o(p)local j=e(p,"[^!-uz]",j)` +
    `j=e(j,"z","!!!!!")local c=i({},{__index=function(i,p)` +
    `local c,q,r,s,t=c(p,1,5)` +
    `local c=(t-33)+(s-33)*85+(r-33)*7225+(q-33)*614125+(c-33)*52200625 ` +
    `local q=c%256;c=g(c/256)local r=c%256;c=g(c/256)` +
    `local s=c%256;c=g(c/256)local c=c%256 local c=f(q,r,s,c)i[p]=c return c end})` +
    `local c=e(j,".....",c)return d(c,1,b)end ` +
    `local a=l(o(d(a,5)))local a=n:DecompressBuffer(a,h)` +
    `local a=m(a)return k(a)end)` +
    `([${eq}[${data}]${eq}],` +
    `${compressed.length},` +
    `string.byte,string.sub,string.gsub,string.char,` +
    `math.floor,Enum.CompressionAlgorithm.Zstd,setmetatable,""` +
    `,(loadstring or load),buffer.fromstring,buffer.tostring,` +
    `game:GetService("EncodingService"))(...)`;

  return {
    output: BANNER + '\n\n' + runtime,
    srcLen: bytes.length,
    cmpLen: compressed.length,
    encLen: data.length
  };
}

// ---------------------------------------------------------------
// UI handlers
// ---------------------------------------------------------------
let lastOutput = '';

function doObfuscate() {
  const src = document.getElementById('input').value;
  if (!src.trim()) return;

  const btn = document.getElementById('obfBtn');
  btn.disabled  = true;
  btn.innerHTML = '<span class="loading-text">WORKING...</span>';

  setTimeout(() => {
    try {
      const { output, srcLen, cmpLen, encLen } = obfuscate(src);
      lastOutput = output;

      document.getElementById('output').textContent = output;
      document.getElementById('outDot').className   = 'dot green';
      document.getElementById('outBadge').textContent = 'DONE';
      document.getElementById('outBadge').className   = 'badge ok';
      document.getElementById('copyBtn').disabled     = false;
      document.getElementById('inputBadge').textContent = 'OK';
      document.getElementById('inputBadge').className   = 'badge ok';

      const stats = document.getElementById('stats');
      stats.style.display = 'flex';
      document.getElementById('sSrc').textContent   = srcLen.toLocaleString();
      document.getElementById('sCmp').textContent   = cmpLen.toLocaleString();
      document.getElementById('sEnc').textContent   = encLen.toLocaleString();
      document.getElementById('sRatio').textContent = (srcLen / cmpLen).toFixed(2) + 'x';
    } catch (e) {
      document.getElementById('outDot').className     = 'dot red';
      document.getElementById('outBadge').textContent = 'ERROR';
      document.getElementById('outBadge').className   = 'badge err';
      document.getElementById('output').textContent   = '// error: ' + e.message;
    }

    btn.disabled  = false;
    btn.innerHTML = 'OBFUSCATE';
  }, 10);
}

function copyOutput() {
  if (!lastOutput) return;
  navigator.clipboard.writeText(lastOutput).then(() => {
    const btn = document.getElementById('copyBtn');
    const prev = btn.textContent;
    btn.textContent = 'COPIED!';
    setTimeout(() => btn.textContent = prev, 1200);
  });
}

function clearAll() {
  document.getElementById('input').value     = '';
  document.getElementById('output').innerHTML =
    '<div class="empty-msg">// obfuscated output will appear here</div>';
  document.getElementById('outDot').className      = 'dot';
  document.getElementById('outBadge').textContent  = 'EMPTY';
  document.getElementById('outBadge').className    = 'badge';
  document.getElementById('copyBtn').disabled      = true;
  document.getElementById('stats').style.display   = 'none';
  document.getElementById('inputBadge').textContent = 'READY';
  document.getElementById('inputBadge').className   = 'badge';
  lastOutput = '';
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') doObfuscate();
});
</script>
</body>
</html>
